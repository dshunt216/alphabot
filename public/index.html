<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alphabot - Bot Project Management</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-deep: #060a1a;
  --bg-main: #0b1026;
  --bg-card: #111738;
  --bg-card-hover: #161d45;
  --bg-sidebar: #0a0f24;
  --bg-input: #0d1330;
  --border: #1a2252;
  --border-light: #252e6a;
  --text-primary: #e8ecf4;
  --text-secondary: #8b92b0;
  --text-muted: #5a6180;
  --accent-purple: #7c5cfc;
  --accent-purple-glow: rgba(124,92,252,0.3);
  --accent-blue: #5c9afc;
  --accent-cyan: #38d9c4;
  --accent-magenta: #e05cfc;
  --accent-pink: #fc5c8a;
  --accent-orange: #fc9c5c;
  --accent-green: #4cdb8a;
  --accent-red: #fc5c5c;
  --gradient-1: linear-gradient(135deg, #7c5cfc, #e05cfc);
  --gradient-2: linear-gradient(135deg, #5c9afc, #38d9c4);
  --gradient-3: linear-gradient(135deg, #fc5c8a, #fc9c5c);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-glow: 0 0 30px rgba(124,92,252,0.15);
  --radius: 14px;
  --radius-sm: 8px;
}
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-purple); }
.app { display: flex; min-height: 100vh; }
.sidebar { width: 260px; min-height: 100vh; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; }
.sidebar-brand { padding: 24px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
.sidebar-brand .logo { width: 38px; height: 38px; border-radius: 10px; background: var(--gradient-1); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: white; }
.sidebar-brand h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.sidebar-brand span { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; }
.sidebar-nav { padding: 16px 12px; flex: 1; overflow-y: auto; }
.nav-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); padding: 12px 12px 8px; font-weight: 600; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; font-size: 13.5px; color: var(--text-secondary); margin-bottom: 2px; position: relative; }
.nav-item:hover { background: var(--bg-card); color: var(--text-primary); }
.nav-item.active { background: linear-gradient(135deg, rgba(124,92,252,0.15), rgba(224,92,252,0.08)); color: var(--accent-purple); font-weight: 500; }
.nav-item.active::before { content: ''; position: absolute; left: 0; top: 6px; bottom: 6px; width: 3px; background: var(--gradient-1); border-radius: 0 3px 3px 0; }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.nav-badge { margin-left: auto; background: var(--accent-purple); color: white; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
.sidebar-footer { padding: 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.sidebar-footer .avatar-sm { width: 34px; height: 34px; border-radius: 50%; background: var(--gradient-1); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; }
.sidebar-footer .info { font-size: 13px; font-weight: 500; }
.sidebar-footer .info span { font-size: 11px; color: var(--text-muted); display: block; }
.main { margin-left: 260px; flex: 1; min-height: 100vh; }
.topbar { padding: 18px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(11,16,38,0.8); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 50; }
.topbar-search { display: flex; align-items: center; gap: 8px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 14px; width: 320px; }
.topbar-search input { background: none; border: none; color: var(--text-primary); font-size: 13px; outline: none; width: 100%; font-family: inherit; }
.topbar-search input::placeholder { color: var(--text-muted); }
.topbar-search svg { color: var(--text-muted); width: 16px; height: 16px; flex-shrink: 0; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.content { padding: 28px 32px; }
.page-header { margin-bottom: 28px; }
.page-header h2 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.page-header p { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
.stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; align-items: center; gap: 16px; transition: all 0.25s; position: relative; overflow: hidden; }
.stat-card:hover { border-color: var(--border-light); transform: translateY(-2px); box-shadow: var(--shadow-glow); }
.stat-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.stat-value { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.stat-card .ring { position: absolute; width: 80px; height: 80px; border-radius: 50%; right: -10px; top: -10px; opacity: 0.08; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: all 0.25s; }
.card:hover { border-color: var(--border-light); }
.card-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-header h3 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.card-body { padding: 18px 22px; }
.btn { padding: 9px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
.btn-primary { background: var(--gradient-1); color: white; box-shadow: 0 4px 15px rgba(124,92,252,0.3); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,92,252,0.4); }
.btn-secondary { background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--border-light); background: var(--bg-card); }
.btn-success { background: linear-gradient(135deg, #38d9c4, #4cdb8a); color: #0a0e1a; }
.btn-danger { background: rgba(252,92,92,0.15); color: var(--accent-red); border: 1px solid rgba(252,92,92,0.2); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-icon { width: 34px; height: 34px; border-radius: var(--radius-sm); background: var(--bg-input); border: 1px solid var(--border); color: var(--text-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
.btn-icon:hover { border-color: var(--accent-purple); color: var(--accent-purple); }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
.form-control { width: 100%; padding: 10px 14px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.2s; }
.form-control:focus { border-color: var(--accent-purple); }
.form-control::placeholder { color: var(--text-muted); }
textarea.form-control { resize: vertical; min-height: 80px; }
select.form-control { appearance: none; cursor: pointer; }
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-purple { background: rgba(124,92,252,0.15); color: var(--accent-purple); }
.badge-blue { background: rgba(92,154,252,0.15); color: var(--accent-blue); }
.badge-cyan { background: rgba(56,217,196,0.15); color: var(--accent-cyan); }
.badge-green { background: rgba(76,219,138,0.15); color: var(--accent-green); }
.badge-orange { background: rgba(252,156,92,0.15); color: var(--accent-orange); }
.badge-pink { background: rgba(252,92,138,0.15); color: var(--accent-pink); }
.badge-red { background: rgba(252,92,92,0.15); color: var(--accent-red); }
.priority-high { background: rgba(252,92,92,0.12); color: var(--accent-red); }
.priority-medium { background: rgba(252,156,92,0.12); color: var(--accent-orange); }
.priority-low { background: rgba(76,219,138,0.12); color: var(--accent-green); }
.avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex-shrink: 0; color: white; overflow: hidden; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.table-wrapper { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { padding: 12px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); text-align: left; border-bottom: 1px solid var(--border); font-weight: 600; }
td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
tr:hover td { background: rgba(124,92,252,0.03); }
tr:last-child td { border-bottom: none; }
.modal-overlay { position: fixed; inset: 0; background: rgba(6,10,26,0.85); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s; }
.modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); width: 480px; max-width: 90vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5); animation: slideUp 0.25s; }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.busy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.busy-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: all 0.25s; position: relative; overflow: hidden; }
.busy-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--gradient-1); }
.busy-card:hover { border-color: var(--border-light); box-shadow: var(--shadow-glow); }
.busy-card .bot-info { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.busy-card .timer { font-size: 22px; font-weight: 700; color: var(--accent-cyan); font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }
.busy-card .project-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.busy-card .project-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.coalesce-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 12px; border-left: 3px solid var(--accent-magenta); }
.coalesce-card .conf-bar { width: 100%; height: 4px; background: var(--bg-input); border-radius: 2px; margin-top: 10px; overflow: hidden; }
.coalesce-card .conf-fill { height: 100%; background: var(--gradient-1); border-radius: 2px; }
.victory-row { display: flex; align-items: center; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--border); }
.victory-row:last-child { border-bottom: none; }
.victory-rank { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; flex-shrink: 0; }
.victory-awards { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.award-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.link-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.25s; text-decoration: none; color: inherit; }
.link-card:hover { border-color: var(--accent-purple); transform: translateY(-2px); box-shadow: var(--shadow-glow); }
.link-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.link-card .link-label { font-size: 14px; font-weight: 500; }
.link-card .link-url { font-size: 11px; color: var(--text-muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
.key-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 10px; }
.key-value { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; color: var(--text-secondary); cursor: pointer; padding: 4px 8px; background: var(--bg-deep); border-radius: 4px; }
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
.team-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; transition: all 0.25s; }
.team-card:hover { border-color: var(--border-light); box-shadow: var(--shadow-glow); }
.team-card .avatar { width: 72px; height: 72px; font-size: 20px; margin: 0 auto 12px; }
.team-card .handler-name { font-size: 14px; font-weight: 600; }
.team-card .bot-name { font-size: 12px; color: var(--accent-cyan); margin-top: 4px; }
.leaderboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
.lb-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; text-align: center; position: relative; overflow: hidden; }
.lb-card.gold { border-color: rgba(255,215,0,0.3); }
.lb-card.gold::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#ffd700,#ffaa00); }
.lb-card.silver { border-color: rgba(192,192,192,0.3); }
.lb-card.silver::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#c0c0c0,#e0e0e0); }
.lb-card.bronze { border-color: rgba(205,127,50,0.3); }
.lb-card.bronze::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#cd7f32,#daa06d); }
.lb-points { font-size: 28px; font-weight: 800; margin: 8px 0 4px; }
.lb-name { font-size: 12px; color: var(--text-secondary); }
.empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
.empty-state svg { margin-bottom: 12px; opacity: 0.3; }
.empty-state p { font-size: 13px; }
.flex { display: flex; } .flex-col { flex-direction: column; }
.items-center { align-items: center; } .justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; }
.mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
.mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; }
.text-sm { font-size: 13px; } .text-xs { font-size: 11px; }
.text-muted { color: var(--text-secondary); }
.w-full { width: 100%; }
.pulse { animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green); display: inline-block; margin-right: 6px; }

/* Photo upload */
.photo-upload { position: relative; cursor: pointer; }
.photo-upload:hover .photo-overlay { opacity: 1; }
.photo-overlay { position: absolute; inset: 0; border-radius: 50%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
.photo-overlay svg { color: white; }

/* Bot icon container */
.bot-icon-wrap { width: 44px; height: 44px; flex-shrink: 0; }
.bot-icon-wrap svg { width: 100%; height: 100%; }

/* Intake card on dashboard */
.intake-item { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.intake-item:last-child { border-bottom: none; }

@media (max-width: 768px) {
  .sidebar { width: 60px; }
  .sidebar-brand h1, .sidebar-brand span, .nav-item span, .nav-label, .sidebar-footer .info, .nav-badge { display: none; }
  .sidebar-brand { padding: 16px; justify-content: center; }
  .nav-item { justify-content: center; padding: 12px; }
  .main { margin-left: 60px; }
  .content { padding: 16px; }
  .stat-row { grid-template-columns: repeat(2, 1fr); }
  .busy-grid { grid-template-columns: 1fr; }
  .topbar-search { width: 180px; }
}
</style>

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const API = '';
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  return res.json();
}

const AVATAR_COLORS = [
  'linear-gradient(135deg, #7c5cfc, #e05cfc)',
  'linear-gradient(135deg, #5c9afc, #38d9c4)',
  'linear-gradient(135deg, #fc5c8a, #fc9c5c)',
  'linear-gradient(135deg, #38d9c4, #4cdb8a)',
  'linear-gradient(135deg, #e05cfc, #5c9afc)',
  'linear-gradient(135deg, #fc9c5c, #ffd700)',
];

const CATEGORY_OPTIONS = [
  { value: 'automation', label: 'Automation', color: 'purple' },
  { value: 'interface', label: 'Interface / UI', color: 'blue' },
  { value: 'integration', label: 'Integration / API', color: 'cyan' },
  { value: 'data', label: 'Data / Analytics', color: 'green' },
  { value: 'workflow', label: 'Workflow', color: 'orange' },
  { value: 'general', label: 'General', color: 'pink' },
];

function formatElapsed(startStr) {
  const ms = Date.now() - new Date(startStr).getTime();
  const s = Math.floor(ms / 1000) % 60;
  const m = Math.floor(ms / 60000) % 60;
  const h = Math.floor(ms / 3600000) % 24;
  const d = Math.floor(ms / 86400000);
  if (d > 0) return `${d}d ${h}h ${String(m).padStart(2,'0')}m`;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatDate(str) {
  return new Date(str).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

const AWARD_STYLES = {
  'Lightning': { bg: 'rgba(255,215,0,0.15)', color: '#ffd700', icon: '\u26A1' },
  'Same Day Ship': { bg: 'rgba(56,217,196,0.15)', color: '#38d9c4', icon: '\uD83D\uDE80' },
  'First Blood': { bg: 'rgba(252,92,92,0.15)', color: '#fc5c5c', icon: '\uD83C\uDFC6' },
  'Veteran': { bg: 'rgba(124,92,252,0.15)', color: '#7c5cfc', icon: '\u2B50' },
  'Legend': { bg: 'rgba(224,92,252,0.15)', color: '#e05cfc', icon: '\uD83D\uDC51' },
};

// ============================================================
// DISTINCT BOT ICONS - Each bot gets a unique SVG icon
// D'Vante (Daniel) = The coolest - cyber crown mech bot
// ============================================================
function BotIconDVante({ size = 44 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
      <defs>
        <linearGradient id="dv1" x1="0" y1="0" x2="64" y2="64"><stop offset="0%" stopColor="#7c5cfc"/><stop offset="100%" stopColor="#e05cfc"/></linearGradient>
        <linearGradient id="dv2" x1="0" y1="0" x2="64" y2="64"><stop offset="0%" stopColor="#ffd700"/><stop offset="100%" stopColor="#ff8c00"/></linearGradient>
        <filter id="dvglow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <rect x="8" y="22" width="48" height="34" rx="8" fill="url(#dv1)" opacity="0.9"/>
      <rect x="12" y="26" width="40" height="26" rx="5" fill="#0a0e27"/>

function Modal({ isOpen, onClose, title, children, footer }) {
  if (!isOpen) return null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header"><h3>{title}</h3><button className="btn-icon" onClick={onClose}><Icon name="x" size={16} /></button></div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

function Avatar({ member, index = 0, size = 40 }) {
  if (member && member.photoUrl) {
    return <div className="avatar" style={{ width: size, height: size, background: AVATAR_COLORS[index % AVATAR_COLORS.length] }}><img src={member.photoUrl} alt={member.handler} /></div>;
  }
  const letter = member ? (member.avatar || member.handler[0]) : '?';
  return <div className="avatar" style={{ width: size, height: size, fontSize: size * 0.38, background: AVATAR_COLORS[index % AVATAR_COLORS.length] }}>{letter}</div>;
}

function LiveTimer({ startedAt }) {
  const [, setTick] = useState(0);
  useEffect(() => { const id = setInterval(() => setTick(t => t + 1), 1000); return () => clearInterval(id); }, []);
  return <span className="timer">{formatElapsed(startedAt)}</span>;
}

// ===========================================================
// MAIN APP
// ===========================================================
function App() {
  const [state, setState] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [modal, setModal] = useState(null);
  const [coalesce, setCoalesce] = useState([]);
  const [toast, setToast] = useState(null);
  const fileInputRef = useRef(null);
  const [uploadTarget, setUploadTarget] = useState(null);

  const load = useCallback(async () => { const data = await api('/api/state'); setState(data); }, []);
  useEffect(() => { load(); }, [load]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

  const loadCoalesce = useCallback(async () => { const recs = await api('/api/coalesce'); setCoalesce(recs); }, []);
  useEffect(() => { if (state && state.intakeQueue.length > 0) loadCoalesce(); }, [state?.intakeQueue?.length]);

  if (!state) return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', color: 'var(--text-muted)' }}>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 48, marginBottom: 16 }}><span style={{ background: 'var(--gradient-1)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>AB</span></div>
        <p>Loading Alphabot...</p>
      </div>
    </div>
  );

  const { team, intakeQueue, busyBots, hallOfVictory, links, apiKeys } = state;

  const leaderboard = team.map((t, i) => {
    const victories = hallOfVictory.filter(v => v.teamId === t.id);
    const totalPoints = victories.reduce((sum, v) => sum + v.points, 0);
    const allAwards = victories.flatMap(v => v.awards);
    return { ...t, victories: victories.length, totalPoints, allAwards, colorIdx: i };
  }).sort((a, b) => b.totalPoints - a.totalPoints);

  // --- Handlers ---
  async function submitIntake(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    await api('/api/intake', { method: 'POST', body: { title: fd.get('title'), description: fd.get('description'), category: fd.get('category'), submittedBy: fd.get('submittedBy'), priority: fd.get('priority') } });
    setModal(null); load(); showToast('Project submitted to queue!');
  }
  async function assignBot(intakeItem) { setModal({ type: 'assign', item: intakeItem }); }
  async function doAssign(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    await api('/api/busy', { method: 'POST', body: { teamId: fd.get('teamId'), intakeId: modal.item?.id, projectTitle: modal.item?.title || fd.get('projectTitle'), projectDescription: modal.item?.description || fd.get('projectDescription') } });
    setModal(null); load(); showToast('Bot assigned!');
  }
  async function completeProject(busyId) { await api(`/api/complete/${busyId}`, { method: 'POST' }); load(); showToast('Project completed! Victory!'); }
  async function removeFromQueue(id) { await api(`/api/intake/${id}`, { method: 'DELETE' }); load(); }
  async function removeBusy(id) { await api(`/api/busy/${id}`, { method: 'DELETE' }); load(); }
  async function renameBotSubmit(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    await api(`/api/team/${modal.member.id}/bot-name`, { method: 'PUT', body: { botName: fd.get('botName') } });
    setModal(null); load(); showToast('Bot renamed!');
  }
  async function addLink(e) {
    e.preventDefault(); const fd = new FormData(e.target);
    await api('/api/links', { method: 'POST', body: { label: fd.get('label'), url: fd.get('url'), category: fd.get('category') } });
    setModal(null); load(); showToast('Link added!');
  }
  async function deleteLink(id) { await api(`/api/links/${id}`, { method: 'DELETE' }); load(); }
  async function addApiKey(e) {
    e.preventDefault(); const fd = new FormData(e.target);
    await api('/api/keys', { method: 'POST', body: { label: fd.get('label'), key: fd.get('key') } });
    setModal(null); load(); showToast('API Key added!');
  }
  async function deleteKey(id) { await api(`/api/keys/${id}`, { method: 'DELETE' }); load(); }
  function copyKey(key) { navigator.clipboard?.writeText(key); showToast('Copied to clipboard!'); }

  // Photo upload handler
  function triggerPhotoUpload(member) {
    setUploadTarget(member);
    fileInputRef.current?.click();
  }
  async function handlePhotoUpload(e) {
    const file = e.target.files?.[0];
    if (!file || !uploadTarget) return;
    const reader = new FileReader();
    reader.onload = async () => {
      await api(`/api/team/${uploadTarget.id}/photo`, { method: 'PUT', body: { photo: reader.result } });
      load(); showToast('Photo updated!');
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  const navItems = [
    { id: 'dashboard', label: 'Dashboard', icon: 'dashboard', badge: intakeQueue.length || null },
    { id: 'busy', label: 'Busy Bots', icon: 'bot', badge: busyBots.length || null },
    { id: 'coalesce', label: 'Coalesce AI', icon: 'merge' },
    { id: 'victory', label: 'Hall of Victory', icon: 'trophy', badge: hallOfVictory.length || null },
    { id: 'links', label: 'Links & APIs', icon: 'link' },
    { id: 'team', label: 'Team', icon: 'users' },
  ];

  function linkIcon(cat) {
    if (cat === 'drive') return { bg: 'linear-gradient(135deg, #5c9afc, #38d9c4)', icon: 'drive' };
    if (cat === 'spreadsheet') return { bg: 'linear-gradient(135deg, #4cdb8a, #38d9c4)', icon: 'sheet' };
    return { bg: 'linear-gradient(135deg, #7c5cfc, #e05cfc)', icon: 'external' };
  }

  // ==================================
  // PAGES
  // ==================================

  function DashboardPage() {
    return (
      <>
        <div className="page-header">

    if (!modal) return null;
    if (modal.type === 'intake') return (
      <Modal isOpen title="Submit Project to Queue" onClose={() => setModal(null)}>
        <form onSubmit={submitIntake}>
          <div className="form-group"><label>Project Title</label><input name="title" className="form-control" placeholder="e.g., Shipping Label Printer" required /></div>
          <div className="form-group"><label>Description</label><textarea name="description" className="form-control" placeholder="Describe the problem, app idea, interface or automation..." required /></div>
          <div className="flex gap-3">
            <div className="form-group" style={{ flex: 1 }}><label>Category</label><select name="category" className="form-control">{CATEGORY_OPTIONS.map(c => <option key={c.value} value={c.value}>{c.label}</option>)}</select></div>
            <div className="form-group" style={{ flex: 1 }}><label>Priority</label><select name="priority" className="form-control"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div>
          </div>
          <div className="form-group"><label>Submitted By</label><select name="submittedBy" className="form-control">{team.map(t => <option key={t.id} value={t.handler}>{t.handler}</option>)}</select></div>

        </form>
      </Modal>
    );

      <Modal isOpen title={modal.item ? `Assign: ${modal.item.title}` : 'Assign Project to Bot'} onClose={() => setModal(null)}>
        <form onSubmit={doAssign}>
          {!modal.item && (<><div className="form-group"><label>Project Title</label><input name="projectTitle" className="form-control" placeholder="Project name" required /></div><div className="form-group"><label>Description</label><textarea name="projectDescription" className="form-control" placeholder="What should the bot work on?" /></div></>)}
          <div className="form-group"><label>Assign to Bot</label><select name="teamId" className="form-control">{team.map(t => { const isBusy = busyBots.some(b => b.teamId === t.id); return <option key={t.id} value={t.id} disabled={isBusy}>{t.botName} ({t.handler}){isBusy ? ' — BUSY' : ''}</option>; })}</select></div>
          <button type="submit" className="btn btn-primary w-full mt-2"><Icon name="play" size={14} /> Assign & Start</button>
        </form>

          <div className="form-group"><label>Current Bot Name</label><div style={{ padding: '10px 14px', background: 'var(--bg-input)', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)', color: 'var(--text-muted)', fontSize: 13 }}>{modal.member.botName}</div></div>

      <Modal isOpen title="Add Shared Link" onClose={() => setModal(null)}>

          <div className="form-group"><label>Label</label><input name="label" className="form-control" placeholder="e.g., Master Inventory Sheet" required /></div>

          <div className="form-group"><label>Category</label><select name="category" className="form-control"><option value="drive">Google Drive</option><option value="spreadsheet">Spreadsheet</option><option value="other">Other</option></select></div>
          <button type="submit" className="btn btn-primary w-full mt-2"><Icon name="plus" size={14} /> Add Link</button>
        </form>
      </Modal>
    );
    if (modal.type === 'addKey') return (
      <Modal isOpen title="Add API Key" onClose={() => setModal(null)}>
        <form onSubmit={addApiKey}>
          <div className="form-group"><label>Label</label><input name="label" className="form-control" placeholder="e.g., OpenAI Production Key" required /></div>
          <div className="form-group"><label>API Key</label><input name="key" className="form-control" placeholder="sk-..." required /></div>
          <button type="submit" className="btn btn-primary w-full mt-2"><Icon name="plus" size={14} /> Save Key</button>
        </form>
      </Modal>
    );
    return null;

        <div className="topbar">
          <div className="topbar-search"><Icon name="search" /><input placeholder="Search projects, bots, handlers..." /></div>
          <div className="topbar-right"><button className="btn btn-primary btn-sm" onClick={() => setModal({ type: 'intake' })}><Icon name="plus" size={14} /> New Project</button></div>
        </div>
        <div className="content">{renderPage()}</div>
      </main>

      {renderModal()}

      {/* Hidden file input for photo uploads */}
      <input type="file" ref={fileInputRef} accept="image/*" style={{ display: 'none' }} onChange={handlePhotoUpload} />

      {toast && (
        <div style={{ position: 'fixed', bottom: 24, right: 24, background: 'var(--bg-card)', border: '1px solid var(--accent-green)', borderRadius: 'var(--radius-sm)', padding: '12px 20px', fontSize: 13, fontWeight: 500, color: 'var(--accent-green)', boxShadow: '0 8px 30px rgba(0,0,0,0.4)', zIndex: 300, animation: 'slideUp 0.25s' }}>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
